# Global settings
global:
  appName: "shopnow-user-service"
  namespace: "shopnow"
  enabledComponents:
    configmap: true
    service: true
    ingress: true

# Deployment
image:
  repository: "harbor.tranvix.click/shopnow/service-user"
  tag: "v1"
  pullPolicy: Always
  pullSecret: "shopnow-registry-secret"

replicaCount: 1
revisionHistoryLimit: 11
rollingUpdate:
  maxSurge: 25%
  maxUnavailable: 25%

# Service
service:
  type: ClusterIP
  port: 5865
  targetPort: 5865

# Ingress
ingress:
  className: "nginx"
  host: "user-service-shopnow.tranvix.click"
  path: "/"
  pathType: Prefix

# ConfigMap
configmap:  
  data: 
    application.properties: |
      # Application configuration
      spring.application.name=user-service
      server.port=5865

      eureka.instance.hostname=user-service
      eureka.instance.instance-id=${spring.application.name}
      eureka.client.service-url.defaultZone=http://shopnow-discovery-server-service:8761/eureka/

      # Datasource configuration
      spring.datasource.url=jdbc:postgresql://postgres:5432/postgres?useSSL=false
      spring.datasource.username=postgres
      spring.datasource.password=admin
      spring.jpa.hibernate.ddl-auto=update
      spring.jpa.show-sql=true
      spring.jpa.properties.hibernate.format-sql=true

      # JWT configuration
      jwt.issuer_uri=http://shopnow-keycloak-realms-service:8080/realms/java-microservice-realm/protocol/openid-connect/token
      jwt.client_id=spring-cloud-client
      jwt.client_secret=AJufwN1eof8P5Gga5Y9atCFqdMuZEuKd
      jwt.grant_type=client_credentials
      jwt.scope=openid offline_access

serviceAccount:
  create: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80