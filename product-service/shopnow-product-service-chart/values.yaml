# Global settings
global:
  appName: "shopnow-product-service"       
  namespace: "shopnow"        
  enabledComponents:
    configmap: true          
    service: true            
    ingress: true             

# Deployment
image:
  repository: "harbor.tranvix.click/shopnow/service-product"
  tag: "v1"
  pullPolicy: Always
  pullSecret: "shopnow-registry-secret" 

replicaCount: 1
rollingUpdate:
  maxSurge: 25%
  maxUnavailable: 25%

service:
  type: ClusterIP
  port: 5861
  targetPort: 5861

ingress:
  className: "nginx"
  host: "product-service-shopnow.tranvix.click"
  path: "/"
  pathType: Prefix

configmap:
  data:
    application.properties: |
      spring.application.name=product-service
      server.port=5861

      eureka.instance.hostname=product-service
      eureka.instance.instance-id=${spring.application.name}
      eureka.client.service-url.defaultZone=http://shopnow-discovery-server-service:8761/eureka/

      spring.datasource.url=jdbc:postgresql://postgres:5432/postgres?useSSL=false
      spring.datasource.username=postgres
      spring.datasource.password=admin
      spring.jpa.hibernate.ddl-auto=update
      spring.jpa.show-sql=true
      spring.jpa.properties.hibernate.format-sql=true

serviceAccount:
  create: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80